<div class="switch">
  <div class="slider" [class.signup]="mode === 'signup'"></div>

  <button
    type="button"
    class="tab"
    [class.active]="mode === 'signin'"
    (click)="setMode('signin')"
  >
    Sign In
  </button>

  <button
    type="button"
    class="tab"
    [class.active]="mode === 'signup'"
    (click)="setMode('signup')"
  >
    Sign Up
  </button>
</div>
