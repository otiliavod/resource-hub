<div class="stat-card">
  <div class="stat-card-header">
    <span class="stat-label">{{ label }}</span>

    @if (icon) {
      <i class="stat-icon" [class]="icon"></i>
    }
  </div>

  <div class="stat-body">
    <div class="stat-value">{{ value }}</div>

    @if (hint) {
      <div class="stat-hint">{{ hint }}</div>
    }
  </div>
</div>
