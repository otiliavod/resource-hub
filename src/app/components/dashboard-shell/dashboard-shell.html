<div class="shell">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">
        <i class="pi pi-box"></i>
      </div>

      <span class="brand-label">ResourceHub</span>
    </div>

    <nav class="nav">
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <i class="pi pi-home"></i>
        <span>Overview</span>
      </a>

      <a>
        <i class="pi pi-clock"></i>
        <span>Timesheet</span>
      </a>

      <a routerLink="/leave" routerLinkActive="active">
        <i class="pi pi-calendar"></i>
        <span>Annual Leave</span>
      </a>
    </nav>

    <div class="bottom">
      <div class="user">
        <span class="user-caption">Signed in as</span>
        <strong>{{ userLabel$ | async }}</strong>
      </div>

      <button type="button" class="logout" (click)="signOut()">
        <i class="pi pi-sign-out"></i>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <main class="content">
    <ng-content></ng-content>
  </main>
</div>
